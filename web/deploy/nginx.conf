# meko. web — static SPA. TLS + public hostname live on the VPS NPM proxy; this serves the
# built assets on port 80 with a client-side-routing fallback so deep links survive a refresh.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Long-cache fingerprinted build assets; they're content-hashed so this is safe.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # SPA fallback — unknown paths resolve to index.html so react-router handles the route.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
