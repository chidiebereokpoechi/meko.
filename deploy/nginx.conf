worker_processes auto;
events { worker_connections 1024; }

http {
  # Slightly above the app's internal request timeout so the API returns a clean error
  # rather than nginx serving a 502 (§12p).
  proxy_read_timeout 35s;

  upstream meko_app { server app:3000; }

  # Hard HTTP→HTTPS redirect, no downgrade (§11b).
  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Internal-only surface (export render/claim/result, dead-letter) must never be reachable
    # from outside; the export sidecar hits the app directly over the private network (§8b/§12n).
    location /api/internal/ {
      return 404;
    }

    location / {
      proxy_pass http://meko_app;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-ID $request_id;
    }

    # WebSocket board connections.
    location /boards/ {
      proxy_pass http://meko_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_set_header Origin $http_origin;          # preserved for the upgrade origin check (§5g)
      proxy_set_header X-Forwarded-Proto https;
      proxy_read_timeout 3600s;                      # long-lived sockets
    }
  }
}
