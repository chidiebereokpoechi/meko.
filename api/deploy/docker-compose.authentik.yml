# Optional Authentik IdP for meko's OIDC login. Standalone overlay — its own Postgres + Redis, NOT
# wired into meko's compose. Bring up with:
#   docker compose -f deploy/docker-compose.authentik.yml up -d
# Then follow deploy/authentik-setup.md. Set AUTHENTIK_SECRET_KEY + PG_PASS in the environment.

services:
  authentik-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${PG_PASS:?set PG_PASS}
      POSTGRES_DB: authentik
    volumes:
      - authentik-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U authentik"]
      interval: 5s
      timeout: 3s
      retries: 10

  authentik-redis:
    image: redis:7-alpine
    volumes:
      - authentik-redis:/data

  authentik-server:
    image: ghcr.io/goauthentik/server:2024.10
    command: server
    environment: &authentik-env
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY:?set AUTHENTIK_SECRET_KEY}
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgres
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS:?set PG_PASS}
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_REDIS__HOST: authentik-redis
    ports:
      - "9000:9000" # http (initial-setup at /if/flow/initial-setup/)
      - "9443:9443" # https
    depends_on: [authentik-postgres, authentik-redis]

  authentik-worker:
    image: ghcr.io/goauthentik/server:2024.10
    command: worker
    environment: *authentik-env
    depends_on: [authentik-postgres, authentik-redis]

volumes:
  authentik-pgdata:
  authentik-redis:
